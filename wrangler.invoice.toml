name = "invoicing-worker"
main = "src/invoice-worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
LOG_LEVEL = "info"
NODE_ENV = "production"

# react-pdf's default (Node) build's renderToBuffer throws on workerd; use the
# browser build (pdf().toBlob()). And swap yoga's runtime-WASM loader for one
# that instantiates a statically-imported (precompiled) module — workerd forbids
# instantiating WASM from bytes at runtime.
[alias]
"@react-pdf/renderer" = "@react-pdf/renderer/lib/react-pdf.browser.js"
"yoga-layout/load" = "./src/invoice-worker/yoga-workerd.ts"

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY

[[r2_buckets]]
binding = "INVOICES_BUCKET"
bucket_name = "invoices"

[[queues.consumers]]
queue = "invoice-processing"
max_batch_size = 5
max_retries = 8
dead_letter_queue = "invoice-processing-dlq"

[[queues.producers]]
binding = "INVOICE_QUEUE"
queue = "invoice-processing"
